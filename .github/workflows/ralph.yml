name: Ralph

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo (org/repo)'
        required: true
        type: string

jobs:
  ralph:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hour hard cap

    steps:
      - name: Checkout ralph-runner
        uses: actions/checkout@v4

      - name: Install claude-code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Clone target repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          INPUT_REPO: ${{ inputs.repo }}
        run: |
          # Read repo from env var — never interpolate ${{ }} directly into shell
          REPO="${INPUT_REPO#https://github.com/}"
          if [[ ! "$REPO" =~ ^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
            echo "Invalid repo format: '$REPO'" && exit 1
          fi
          # Use gh credential helper — token never stored in .git/config or URLs
          git config --global credential.helper '!gh auth git-credential'
          git clone "https://github.com/${REPO}.git" "$HOME/workspace"
          git -C "$HOME/workspace" config user.email "ralph@ralph-runner"
          git -C "$HOME/workspace" config user.name "Ralph"

      - name: Copy default .ralph config if repo has none
        run: |
          if [ ! -f $HOME/workspace/.ralph/PROMPT.md ]; then
            mkdir -p $HOME/workspace/.ralph
            cp .ralph/PROMPT.md $HOME/workspace/.ralph/PROMPT.md
          fi
          if [ ! -f $HOME/workspace/.ralph/guardrails.md ]; then
            mkdir -p $HOME/workspace/.ralph
            cp .ralph/guardrails.md $HOME/workspace/.ralph/guardrails.md
          fi

      - name: Run Ralph
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd "$HOME/workspace"
          bash "$GITHUB_WORKSPACE/ralph-loop.sh"
